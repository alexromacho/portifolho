<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#263c96">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Pedidos">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Caio Aragua</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="img/html.png">
    <link rel="stylesheet" href="assets.css/style.css">
    <script src="java.js" defer></script>
</head>
<body>
    <header class="cabecalho">
        <nav class="lista__de__compra" aria-label="Menu principal">
            <a class="lista__menu" href="index.html">Inicio</a>
            <a class="lista__menu" href="fornecedores.html">Fornecedores</a>
        </nav>
    </header>

    <main class="content">
        <h1>Caio Aragua</h1>

        <form class="pedido" id="pedidoAgua">

            <div class="campo">
                <label for="aguaSemGas">Água sem gás</label>
                <input
                    type="number"
                    id="aguaSemGas"
                    name="aguaSemGas"
                    min="0">
            </div>

            <div class="campo">
                <label for="aguaComGas">Água com gás</label>
                <input
                    type="number"
                    id="aguaComGas"
                    name="aguaComGas"
                    min="0">
            </div>

            <fieldset class="item-extra">
                <legend>Adicionar outro item</legend>

                <div class="campo">
                    <label for="itemExtraAgua">Item</label>
                    <input type="text" id="itemExtraAgua" name="itemExtra" placeholder="Nome do item">
                </div>

                <button class="botao botao--secundario" type="button" data-add-item>Adicionar item na lista</button>
            </fieldset>

            <ul class="lista-itens" aria-label="Itens adicionados"></ul>
            <p class="pedido__mensagem" id="mensagemAgua" aria-live="polite"></p>

            <button class="botao" type="submit">
                Enviar pedido pelo WhatsApp
            </button>

        </form>
    </main>

    <footer class="rodape">
        <p>Criado por Alex</p>
    </footer>
</body>
</html>
